<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: sans-serif; padding: 12px; background: #111; color: #eee; margin: 0; }
    h3 { margin: 0 0 12px; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 8px; }
    label { font-size: 12px; color: #aaa; display: block; margin-top: 8px; margin-bottom: 4px; }
    select, button { width: 100%; margin-bottom: 8px; padding: 8px; background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
    select:focus, button:focus { outline: 1px solid #007bff; }
    button { cursor: pointer; background: #007bff; color: white; border: none; font-weight: bold; margin-top: 12px; }
    button:hover { background: #0056b3; }
    #list { font-size: 13px; max-height: 250px; overflow-y: auto; margin-top: 12px; border-top: 1px solid #333; padding-top: 8px; }
    .item { padding: 8px 0; border-bottom: 1px solid #222; }
    .item:last-child { border-bottom: none; }
    .item small { color: #888; display: block; margin-top: 4px; font-size: 11px; }
    .empty-msg { color: #888; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <h3>⚡ TouchGrass</h3>

  <label>Section</label>
  <select id="sectionFilter">
    <option value="all">All sections</option>
    <option value="MVC">MVC</option>
    <option value="CS-1005">CS-1005 Discrete Structures</option>
    <option value="Expository">Expository Writing-Lab</option>
    <option value="OOP">OOP Lab Section H</option>
  </select>

  <label>Teacher</label>
  <select id="teacherFilter">
    <option value="all">All teachers</option>
    <!-- Dynamically populated by popup.js -->
  </select>

  <label>Time</label>
  <select id="timeFilter">
    <option value="all">All time</option>
    <option value="today">Today</option>
    <option value="week">This week</option>
  </select>

  <button id="applyFilters">Apply Filters</button>

  <div id="list">Loading...</div>

  <script src="popup.js"></script>
</body>
</html>
