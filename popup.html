<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: sans-serif; padding: 12px; background: #111; color: #eee; margin: 0; }
    h3 { margin: 0 0 12px; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 8px; }
    #debugBox { background: #ffff00; color: #000; padding: 8px; font-size: 11px; margin-bottom: 12px; border-radius: 4px; word-wrap: break-word; max-height: 100px; overflow-y: auto; font-family: monospace; }
    label { font-size: 12px; color: #aaa; display: block; margin-top: 8px; margin-bottom: 4px; }
    select, button { width: 100%; margin-bottom: 8px; padding: 8px; background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
    button { cursor: pointer; background: #007bff; color: white; border: none; font-weight: bold; margin-top: 12px; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
    <h3>⚡ TouchGrass</h3>
    <div id="debugBox">Loading...</div>
    <label>Teacher</label>
    <select id="teacherFilter">
        <option value="all">All teachers</option>
    </select>



    <button id="applyFilters">Apply Filter</button>

    <label>Milestone 1 check</label>
    <button id="testAuth">Test Classroom API Auth</button>
    <div id="authResult" style="font-size: 11px; color: #9f9; word-wrap: break-word;"></div>

    <label>Milestone 2 check</label>
    <select id="courseSelect"><option value="">Run auth test first ↑</option></select>
    <button id="syncCourse">Sync Selected Course Data</button>
    <div id="syncResult" style="font-size: 11px; color: #9cf; word-wrap: break-word;"></div>

    <script src="popup.js"></script>



</body>
</html>
